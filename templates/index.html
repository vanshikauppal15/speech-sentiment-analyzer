<!DOCTYPE html>
<html>

<head>
<title>Speech Sentiment Analyzer</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🎤 Speech Sentiment Analyzer</h1>

<p>Upload an audio file and analyze its sentiment</p>

<form action="/analyze" method="post" enctype="multipart/form-data">

<input type="file" name="audio" accept="audio/*" required>

<br><br>

<button type="submit">Analyze Audio</button>

</form>

{% if transcription %}

<div class="result">

<h2>Transcription</h2>
<p>{{ transcription }}</p>

<h2>Sentiment</h2>
<p class="sentiment">{{ sentiment }} (confidence {{ "%.2f"|format(confidence) }})</p>

</div>

{% endif %}

</div>

</body>

</html>
